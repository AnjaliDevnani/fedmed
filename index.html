<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FedMed — Federated Learning Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>:root {
  --bg:        #0c0e14;
  --bg2:       #131720;
  --bg3:       #1a2032;
  --bg4:       #212843;
  --border:    rgba(255,255,255,.07);
  --border2:   rgba(255,255,255,.12);
  --text:      #e8eaf0;
  --text2:     #8b92aa;
  --text3:     #525870;
  --teal:      #00c9a7;
  --blue:      #4f8ef7;
  --purple:    #9d7dff;
  --coral:     #ff6b6b;
  --amber:     #f5a623;
  --green:     #2dd4a6;
}

body {
  margin: 0; padding: 0; background: var(--bg); color: var(--text);
  font-family: 'Inter', sans-serif; overflow: hidden;
}
* { box-sizing: border-box; }
.syne, h1, h2, h3, h4 { font-family: 'Syne', sans-serif; }
.mono { font-family: 'DM Mono', monospace; }

/* Layout Grid */
.shell { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 220px; flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.main { flex: 1; overflow-y: auto; padding: 40px; background: var(--bg); }

/* Sidebar */
.logo-section { padding: 24px; border-bottom: 1px solid var(--border); }
.logo-section svg { width: 16px; height: 16px; color: var(--teal); margin-bottom: 8px; }
.logo-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin: 0 0 4px 0; }
.logo-tag { font-size: 11px; color: var(--text3); margin: 0; line-height: 1.4; }

.nav-menu { padding: 16px 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
.nav-item { 
  display: flex; align-items: center; gap: 12px; padding: 10px 12px;
  color: var(--text2); font-size: 13px; font-weight: 500;
  border-radius: 6px; cursor: pointer; transition: all 0.2s;
  background: transparent; border: none; width: 100%; text-align: left;
}
.nav-item:hover { color: var(--text); background: var(--bg3); }
.nav-item.active { color: var(--teal); background: rgba(0,201,167,.08); }
.nav-item svg { width: 16px; height: 16px; }

.nav-spacer { flex: 1; }
.user-section { padding: 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.avatar { width: 32px; height: 32px; background: rgba(0,201,167,.12); color: var(--teal); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; font-family: 'Syne', sans-serif; border: 1px solid rgba(0,201,167,.25); }
.user-name { font-size: 13px; font-weight: 600; color: var(--text); margin: 0; }
.user-role { font-size: 11px; color: var(--text3); margin: 3px 0 0 0; }

/* Page Header */
.page-header { margin-bottom: 32px; }
.page-title { font-size: 28px; font-weight: 600; margin: 0 0 8px 0; color: var(--text); }
.page-subtitle { font-size: 14px; color: var(--text2); margin: 0; }

/* Cards & Grid */
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
.grid-2-60 { display: grid; grid-template-columns: 60% calc(40% - 20px); gap: 20px; margin-bottom: 24px; }
.grid-2-65 { display: grid; grid-template-columns: 65% calc(35% - 20px); gap: 20px; align-items: start; }

.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
.inner-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }

.flex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.card-title { font-size: 15px; font-weight: 600; margin: 0; color: var(--text); }
.text3 { color: var(--text3); text-transform: uppercase; font-size: 11px; }

/* Metrics */
.metric-card { transition: border-color 0.2s; position: relative; overflow: hidden; }
.metric-card:hover { border-color: var(--border2); }
.metric-label { font-size: 11px; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; font-family: 'DM Mono', monospace; display: flex; align-items: center; gap: 6px; }
.metric-value { font-size: 26px; color: var(--text); font-family: 'DM Mono', monospace; margin: 0 0 4px 0; font-weight: 500; }
.metric-sub { font-size: 12px; color: var(--text2); margin: 0; }

.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.pill-teal { background: var(--teal); box-shadow: 0 0 6px var(--teal); }
.pill-blue { background: var(--blue); box-shadow: 0 0 6px var(--blue); }
.pill-purple { background: var(--purple); box-shadow: 0 0 6px var(--purple); }
.pill-amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); }

/* Chips */
.chip { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; font-family: 'Inter', sans-serif;}
.chip-teal { background: rgba(0,201,167,.12); color: var(--teal); }
.chip-amber { background: rgba(245,166,35,.12); color: var(--amber); }
.chip-coral { background: rgba(255,107,107,.12); color: var(--coral); }
.chip-blue { background: rgba(79,142,247,.12); color: var(--blue); }
.chip-purple { background: rgba(157,125,255,.12); color: var(--purple); }
.chip-gray { background: rgba(255,255,255,.06); color: var(--text2); }

/* Tables */
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px; font-size: 10px; text-transform: uppercase; color: var(--text3); border-bottom: 1px solid var(--border); font-weight: 600; }
td { padding: 14px 12px; font-size: 12px; color: var(--text2); border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg3); }
td.bold-mono { font-family: 'DM Mono', monospace; color: var(--text); font-weight: 500; }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: none; border-radius: 6px; padding: 10px 16px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
.btn-primary { background: var(--teal); color: #021810; font-weight: 600; }
.btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
.btn-primary:active { transform: scale(0.97); }
.btn-secondary { background: transparent; border: 1px solid var(--border2); color: var(--text); }
.btn-secondary:hover { background: var(--bg3); }

/* Forms & Dropzone */
.dropzone { border: 1.5px dashed var(--border2); border-radius: 16px; padding: 48px 24px; text-align: center; cursor: pointer; transition: all 0.2s ease; position: relative; }
.dropzone:hover, .dropzone.dragover { border-color: var(--teal); background: rgba(0,201,167,.04); }
.form-control { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); border-radius: 6px; padding: 9px 12px; font-size: 13px; outline: none; transition: border-color 0.2s; width: 100%; }
.form-control:focus { border-color: var(--teal); }
select.form-control { appearance: none; padding-right: 30px; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%238b92aa%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 12px top 50%; background-size: 10px auto; }

/* Progress bar */
.progress-wrap { position: relative; width: 100%; background: rgba(255,255,255,.05); border-radius: 3px; overflow: hidden; }
.progress-bar { height: 100%; border-radius: 3px; transition: width 0.4s ease; background: linear-gradient(90deg, #00c9a7, #4f8ef7); }

/* Monitor specific */
.node-circle { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--border2); background: transparent; transition: all 0.4s ease; z-index: 2; position: relative; color: var(--text); }
.node-hospital.idle { border-color: var(--teal); background: rgba(0,201,167,.12); color: var(--teal); }
.node-hospital.train { border-color: var(--amber); background: rgba(245,166,35,.12); color: var(--amber); animation: pulse 1.5s infinite; }
.node-hospital.send { border-color: var(--blue); background: rgba(79,142,247,.12); color: var(--blue); }
.node-server { border-color: var(--purple); background: rgba(157,125,255,.12); color: var(--purple); }
.node-server.agg { animation: pulse 1.5s infinite; filter: drop-shadow(0 0 10px var(--purple)); }

/* Animations */
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeInUp 0.3s ease both; }
@keyframes packet-move { 0% { left: -4px; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { left: calc(100% + 4px); opacity: 0; } }
@keyframes packet-move-rev { 0% { left: calc(100% + 4px); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { left: -4px; opacity: 0; } }
@keyframes packet-move-vert { 0% { top: -4px; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: calc(100% + 4px); opacity: 0; } }
@keyframes packet-move-vert-rev { 0% { top: calc(100% + 4px); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: -4px; opacity: 0; } }
.packet-anim-fwd { animation: packet-move 1.2s ease-in-out infinite; }
.packet-anim-rev { animation: packet-move-rev 1.2s ease-in-out infinite; }
.packet-anim-vert-fwd { animation: packet-move-vert 1.2s ease-in-out infinite; }
.packet-anim-vert-rev { animation: packet-move-vert-rev 1.2s ease-in-out infinite; }
.fl-packet { position: absolute; width: 8px; height: 8px; border-radius: 50%; opacity: 0; z-index: 5; }

/* Scrollbars */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #212843; border-radius: 3px; }
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="logo-section">
      <svg viewBox="0 0 16 16" fill="none"><path d="M8 2L13 5V11L8 14L3 11V5L8 2Z" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="2" fill="currentColor"/></svg>

        <p class="user-role">Radiologist · Node A</p>
      </div>
    </div>
  </aside>
  <main class="main" id="main-content"></main>

<template id="view-upload">
  <div class="fade-in">
    <div class="page-header">
      <h2 class="page-title syne">Upload Patient Data</h2>
      <p class="page-subtitle">Data stays on your local node — only model gradients are shared with the FL server</p>
    </div>
    <div class="grid-2-65">
      <div style="display:flex; flex-direction:column; gap:20px;">
        <div class="dropzone" onclick="triggerFileSelect()" ondragover="event.preventDefault(); this.classList.add('dragover')" ondragleave="event.preventDefault(); this.classList.remove('dragover')" ondrop="handleDrop(event)">
          <div style="font-size:36px; margin-bottom:12px;">🫁</div>
          <div class="syne" style="font-size:15px; font-weight:700;">Drop medical scan or dataset here</div>
          <div style="font-size:12px; color:var(--text3); margin-top:8px;">Supports DICOM, JPEG, PNG, CSV, XLSX — max 2GB</div>
          <div style="font-size:13px; color:var(--teal); margin-top:16px;">Click to browse files</div>
          <input type="file" id="fileUpload" style="display:none;" accept=".dcm,.jpg,.jpeg,.png,.csv,.xlsx" onchange="handleFile(this.files[0])">
        </div>
        <div id="upload-preview" class="card fade-in" style="display:none; padding:16px; border-color:var(--border2);">
          <div class="flex-header" style="margin-bottom:8px;">
            <div class="syne" style="font-size:13px; font-weight:600;">Selected File</div>
            <button onclick="clearFile()" style="background:none; border:none; color:var(--coral); cursor:pointer; font-size:11px;">✕ Remove</button>
          </div>
          <div style="display:flex; align-items:center; gap:12px;">
            <div id="file-icon" style="font-size:24px;">🔬</div>

function triggerFileSelect() { document.getElementById('fileUpload').click(); }
function handleDrop(e) {
  e.preventDefault(); e.target.closest('.dropzone').classList.remove('dragover');
  if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
}
function handleFile(file) {
  if(!file) return;
  document.getElementById('upload-preview').style.display = 'block';
  document.getElementById('filename').innerText = file.name;
  document.getElementById('filesize').innerText = (file.size / 1024 / 1024).toFixed(2) + ' MB';
  let ext = file.name.split('.').pop().toLowerCase();
  document.getElementById('file-icon').innerText = (['csv','xlsx'].includes(ext)) ? '📊' : '🔬';
}
function clearFile() {
  document.getElementById('fileUpload').value = '';
  document.getElementById('upload-preview').style.display = 'none';
}

function simulateUpload() {
  const pBar = document.getElementById('upload-progress');
  if(!pBar) return;
  pBar.style.display = 'block'; document.getElementById('upload-success').style.display = 'none';
  const steps = [
    { pct: 30, text: "Encrypting locally…" }, { pct: 60, text: "Applying differential noise…" },
    { pct: 85, text: "Preparing gradient update…" }, { pct: 100, text: "Queuing for FL round…" }
  ];
  let delay = 0;
  steps.forEach((step, i) => {
    setTimeout(() => {
      document.getElementById('upload-progress-fill').style.width = step.pct + '%';
      document.getElementById('upload-progress-text').innerText = step.text;
      document.getElementById('upload-progress-pct').innerText = step.pct + '%';
      if(i === steps.length - 1) setTimeout(() => { pBar.style.display = 'none'; document.getElementById('upload-success').style.display = 'block'; }, 700);
    }, delay);
    delay += 700;
  });
}

async function runInference() {
  const fileInput = document.getElementById('fileUpload');
  if (!fileInput.files.length) {
    alert('Please select a file first.');
    return;
  }
  const file = fileInput.files[0];
  const formData = new FormData();
  formData.append('file', file);
  
  const resDiv = document.getElementById('upload-result');
  resDiv.style.display = 'block';
  resDiv.innerHTML = '<div style="padding:14px; text-align:center;">Running inference, please wait...</div>';
  
  try {
    const response = await fetch('/api/predict', {
      method: 'POST',
      body: formData
    });
    const result = await response.json();
    
    if (result.error) {
      resDiv.innerHTML = `<div style="padding:14px; color:var(--coral);">Error: ${result.error}</div>`;
      return;
    }
    
    resDiv.innerHTML = `
      <div class="text3" style="margin-bottom:6px;">Diagnosis Result</div>
      <div class="syne" style="color:${result.diagnosis === 'Normal' ? 'var(--teal)' : 'var(--coral)'}; font-size:18px; font-weight:700; margin-bottom:4px;">${result.diagnosis}</div>

    resDiv.innerHTML = `<div style="padding:14px; color:var(--coral);">Server Error. Ensure backend is running.</div>`;
  }
}

       document.getElementById('pack-b').classList.add('packet-anim-vert-fwd', 'packet-blue');
    }
    
    phaseIdx++;
    if (phaseIdx >= phases.length) {
      setTimeout(() => {
        if(!monitorRunning) return;
        phaseIdx = 0; monitorRound++; updateRoundUI();
        if (monitorRound >= TOTAL_ROUNDS) { setCompleteState(); return; }
        runPhase();
      }, ph.duration);
    } else { monitorInterval = setTimeout(runPhase, ph.duration); }
  };
  runPhase();
}

function updateRoundUI() {
  const lbl = document.getElementById('round-label');
  if(lbl) lbl.innerText = `Round ${monitorRound}/10`;
  document.querySelectorAll('.round-block').forEach((el, idx) => {
    el.style.background = idx < monitorRound ? 'var(--teal)' : (idx === monitorRound ? 'var(--amber)' : 'var(--border)');
    if(idx === monitorRound) el.style.boxShadow = '0 0 8px var(--amber)';
    else el.style.boxShadow = 'none';
  });

  if(liveChartInst && monitorRound > 0 && monitorRound <= TOTAL_ROUNDS) {
    const rIdx = monitorRound - 1; 
    liveChartInst.data.labels.push(`R${monitorRound}`);
    liveChartInst.data.datasets[0].data.push(globalAccHistory[rIdx]);
    liveChartInst.data.datasets[1].data.push(lossHistory[rIdx]);
    liveChartInst.update();
    
    const gVal = document.getElementById('global-acc-val');
    if(gVal) gVal.innerText = globalAccHistory[rIdx] + '%';
    const gBar = document.getElementById('global-bar');
    if(gBar) gBar.style.width = globalAccHistory[rIdx] + '%';
    
    hospitalData.forEach(h => {
       const jitter = (Math.random() * 4 - 2);
       const val = (globalAccHistory[rIdx] + jitter).toFixed(1);
       const accEl = document.getElementById(`client-acc-${h.id}`);
       if(accEl) accEl.innerText = val + '%';
       const barEl = document.getElementById(`client-bar-${h.id}`);
       if(barEl) barEl.style.width = val + '%';
    });
  }
}

function setCompleteState() {
  monitorRunning = false;
  document.getElementById('start-btn').innerHTML = '▶ Finished';
  document.getElementById('start-btn').disabled = true;
  document.getElementById('stat-server').innerText = "Model Optimized";
  document.getElementById('monitor-phase-chip').innerText = "Training Complete";
  document.getElementById('monitor-phase-chip').className = "chip chip-teal";
  document.querySelectorAll('.node-hospital').forEach(h => h.className = 'node-circle node-hospital idle');
}

function resetMonitor() {
  clearTimeout(monitorInterval);
  monitorRunning = false; monitorRound = 0;
  document.getElementById('start-btn').innerHTML = '▶ Start Training';
  document.getElementById('start-btn').disabled = false;
  if(liveChartInst) {
    liveChartInst.data.labels = []; liveChartInst.data.datasets.forEach(d => d.data=[]); liveChartInst.update();
  }
  updateRoundUI();
  document.getElementById('monitor-phase-chip').innerText = "Ready";
  document.getElementById('monitor-phase-chip').className = "chip chip-gray";
}

window.onload = () => navigate('dashboard');
</script>
</body>
</html>
